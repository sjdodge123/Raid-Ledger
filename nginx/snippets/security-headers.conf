# ROK-1158: Security headers snippet (CSP + HSTS + XCTO + XFO + Referrer + Permissions).
# Why include: nginx `add_header` does NOT inherit into a child `location` once that
# child defines any `add_header` of its own (e.g. the static-asset block sets
# `Cache-Control`). Re-include this snippet from each such location to keep the full
# header set on every response (architect-ROK-1158.md §2).
add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://wow.zamimg.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data: blob: https://images.igdb.com https://cdn.cloudflare.steamstatic.com https://cdn.akamai.steamstatic.com https://cdn.discordapp.com https://media.discordapp.net https://wow.zamimg.com https://render.worldofwarcraft.com; font-src 'self' data: https://fonts.gstatic.com; connect-src 'self' https://*.sentry.io https://*.ingest.sentry.io https://*.ingest.us.sentry.io; frame-src https://www.youtube.com https://www.youtube-nocookie.com https://player.twitch.tv https://www.wowhead.com https://wowhead.com https://classic.wowhead.com; worker-src 'self' blob:; frame-ancestors 'none'; object-src 'none'; base-uri 'self'; form-action 'self'; report-uri /api/csp-report; upgrade-insecure-requests" always;
add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
add_header X-Content-Type-Options "nosniff" always;
add_header X-Frame-Options "DENY" always;
add_header Referrer-Policy "strict-origin-when-cross-origin" always;
add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=(), usb=()" always;

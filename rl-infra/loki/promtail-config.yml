server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: docker
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 10s
    relabel_configs:
      - source_labels: ["__meta_docker_container_name"]
        regex: "/(.*)"
        target_label: container
      - source_labels: ["__meta_docker_container_label_rl_role"]
        target_label: rl_role
      - source_labels: ["__meta_docker_container_label_rl_slot"]
        target_label: rl_slot
      - source_labels: ["__meta_docker_container_label_rl_env_slug"]
        target_label: rl_env
      - action: replace
        replacement: docker
        target_label: source
    pipeline_stages:
      - json:
          expressions:
            level: level
            msg: msg
      - labels:
          level:

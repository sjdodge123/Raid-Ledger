# Mutagen sync session reference — DOCUMENTATION ONLY.
#
# This file is NOT consumed at runtime. The live sync session is created by
# `rl claim` via direct flags in `rl-infra/cli/rl::ensure_mutagen_sync`
# (search for `mutagen sync create --mode=one-way-replica`). This template is
# kept as a single-file reference for the flag set and the ignore list so
# operators can audit sync behavior without grepping shell scripts.
#
# Placeholders, if you ever render this manually:
#   {{SLOT}}        — runner slot number (1..4)
#   {{LAPTOP_REPO}} — absolute path on the laptop, e.g. /Users/sdodge/Documents/Projects/Raid-Ledger
#   {{VM_HOST}}     — SSH host of the rl-infra VM
#   {{VM_USER}}     — SSH user
sync:
  defaults:
    # one-way-replica: laptop (alpha) is the SOLE source of truth; the VM
    # (beta) is overwritten on every sync. Matches `rl claim` --mode flag.
    mode: one-way-replica
    symlink:
      mode: posix-raw
    permissions:
      defaultFileMode: 0644
      defaultDirectoryMode: 0755
    ignore:
      vcs: false   # we need .git/HEAD + refs synced for branch awareness
      paths:
        - node_modules
        - "**/node_modules"
        - dist
        - "**/dist"
        - coverage
        - "**/coverage"
        - .next
        - .vite
        - .turbo
        - playwright-report
        - test-results
        - .git/objects   # objects stay on the laptop; refs+HEAD sync
        - .git/lfs
        - .DS_Store
        - "*.swp"
        - "*.log"
        - tools/test-bot/node_modules
        - api/dist
        - web/dist
        - packages/contract/dist
    watch:
      pollingInterval: 2
    digest:
      defaultAlgorithm: xxh128

  rl-slot-{{SLOT}}:
    alpha: "{{LAPTOP_REPO}}"
    beta: "{{VM_USER}}@{{VM_HOST}}:/srv/rl-infra/runners/slot-{{SLOT}}/worktree"
    configurationBeta:
      permissions:
        defaultFileMode: 0644

# Static Traefik routes for the rl-infra stack.
# Per-env routes live in sibling files (env-{slug}.yml) managed by env-spin.
http:
  middlewares:
    rl-headers:
      headers:
        customResponseHeaders:
          X-Rl-Infra: "true"

  routers:
    # Infra services intentionally LAN-only (Host(`X.rl.lan`), NOT a regex).
    # Traefik dashboard runs with insecure:true (no auth) and Grafana/Registry
    # are admin tools — exposing them on the external apex would require
    # auth wiring we don't have. The fleet dashboard surfaces a "switch to
    # LAN" hint when accessed externally to call this out.
    traefik-dash:
      rule: "Host(`traefik.rl.lan`)"
      service: api@internal
      entryPoints: [web]
      middlewares: [rl-headers]

    grafana:
      rule: "Host(`grafana.rl.lan`)"
      service: grafana
      entryPoints: [web]
      middlewares: [rl-headers]

    registry:
      rule: "Host(`registry.rl.lan`)"
      service: registry
      entryPoints: [web]
      middlewares: [rl-headers]

    # Mobile-friendly fleet dashboard. Bookmark on phone for at-a-glance
    # slot/env state. Reads state/*.json read-only; no mutating actions.
    # Dashboard. Internal: fleet.rl.lan. External via reverse-proxy: also
    # accept any Host whose path starts with /fleet/ AND the bare host
    # `fleet.${RL_PUBLIC_DOMAIN}` if you set that on the proxy side.
    # If you want a different external hostname, add it here.
    dashboard:
      rule: "Host(`fleet.rl.lan`) || HostRegexp(`^fleet\\..+$`)"
      service: dashboard
      entryPoints: [web]
      middlewares: [rl-headers]

    # ROK-1337 — block raw task log content from leaking to the public
    # internet. `/api/tasks/<id>/log` returns the last 50 KiB of an
    # append-only log file with no auth (server.js:1170 comment marks
    # this as intentional under the LAN+Cloudflare trust model — but
    # Cloudflare is a CDN proxy, not authentication, so any external
    # visitor that loads the dashboard can read every task's log,
    # including build output, postgres NOTICE dumps with schema
    # internals, and stack traces with absolute paths). LAN access
    # (Host(`fleet.rl.lan`)) keeps working for operators on the network.
    # Priority must beat the dashboard router so this wins for matches.
    dashboard-block-task-logs:
      rule: "HostRegexp(`^fleet\\..+$`) && !Host(`fleet.rl.lan`) && PathRegexp(`^/api/tasks/[^/]+/log$`)"
      service: fallback
      entryPoints: [web]
      priority: 200

    # Runner slots — both default (1,2) and optional (3,4) listed. Routes for
    # slot-3/slot-4 are inactive until you enable the `extra-slots` compose
    # profile; Traefik will log "no available servers" until then, which is
    # harmless.
    slot-1-api:
      rule: "Host(`slot-1.rl.lan`) && PathPrefix(`/api`)"
      service: slot-1-api
      entryPoints: [web]
      priority: 100
    slot-1-web:
      rule: "Host(`slot-1.rl.lan`)"
      service: slot-1-web
      entryPoints: [web]
    slot-1-debug:
      rule: "Host(`slot-1-debug.rl.lan`)"
      service: slot-1-debug
      entryPoints: [web]

    slot-2-api:
      rule: "Host(`slot-2.rl.lan`) && PathPrefix(`/api`)"
      service: slot-2-api
      entryPoints: [web]
      priority: 100
    slot-2-web:
      rule: "Host(`slot-2.rl.lan`)"
      service: slot-2-web
      entryPoints: [web]
    slot-2-debug:
      rule: "Host(`slot-2-debug.rl.lan`)"
      service: slot-2-debug
      entryPoints: [web]

    slot-3-api:
      rule: "Host(`slot-3.rl.lan`) && PathPrefix(`/api`)"
      service: slot-3-api
      entryPoints: [web]
      priority: 100
    slot-3-web:
      rule: "Host(`slot-3.rl.lan`)"
      service: slot-3-web
      entryPoints: [web]
    slot-3-debug:
      rule: "Host(`slot-3-debug.rl.lan`)"
      service: slot-3-debug
      entryPoints: [web]

    slot-4-api:
      rule: "Host(`slot-4.rl.lan`) && PathPrefix(`/api`)"
      service: slot-4-api
      entryPoints: [web]
      priority: 100
    slot-4-web:
      rule: "Host(`slot-4.rl.lan`)"
      service: slot-4-web
      entryPoints: [web]
    slot-4-debug:
      rule: "Host(`slot-4-debug.rl.lan`)"
      service: slot-4-debug
      entryPoints: [web]

    # Fallback for unknown hostnames — returns 502 so the operator gets a clear
    # signal instead of a confusing default Traefik page.
    fallback:
      rule: "HostRegexp(`.+`)"
      priority: 1
      service: fallback
      middlewares: [rl-headers]

  services:
    grafana:
      loadBalancer:
        servers:
          - url: "http://rl-grafana:3000"
    registry:
      loadBalancer:
        servers:
          - url: "http://rl-registry:5000"

    dashboard:
      loadBalancer:
        servers:
          - url: "http://rl-dashboard:8080"

    slot-1-web:
      loadBalancer:
        servers: [{ url: "http://rl-runner-1:5173" }]
    slot-1-api:
      loadBalancer:
        servers: [{ url: "http://rl-runner-1:3000" }]
    slot-1-debug:
      loadBalancer:
        servers: [{ url: "http://rl-runner-1:9229" }]

    slot-2-web:
      loadBalancer:
        servers: [{ url: "http://rl-runner-2:5173" }]
    slot-2-api:
      loadBalancer:
        servers: [{ url: "http://rl-runner-2:3000" }]
    slot-2-debug:
      loadBalancer:
        servers: [{ url: "http://rl-runner-2:9229" }]

    slot-3-web:
      loadBalancer:
        servers: [{ url: "http://rl-runner-3:5173" }]
    slot-3-api:
      loadBalancer:
        servers: [{ url: "http://rl-runner-3:3000" }]
    slot-3-debug:
      loadBalancer:
        servers: [{ url: "http://rl-runner-3:9229" }]

    slot-4-web:
      loadBalancer:
        servers: [{ url: "http://rl-runner-4:5173" }]
    slot-4-api:
      loadBalancer:
        servers: [{ url: "http://rl-runner-4:3000" }]
    slot-4-debug:
      loadBalancer:
        servers: [{ url: "http://rl-runner-4:9229" }]

    fallback:
      loadBalancer:
        servers:
          - url: "http://127.0.0.1:65535"   # intentionally unreachable → 502

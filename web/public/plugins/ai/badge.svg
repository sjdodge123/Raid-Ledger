<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48">
  <rect width="48" height="48" rx="8" fill="#8B5CF6"/>
  <g fill="white">
    <!-- Brain/chip icon -->
    <rect x="14" y="14" width="20" height="20" rx="4" fill="none" stroke="white" stroke-width="2"/>
    <!-- Circuit lines -->
    <line x1="10" y1="20" x2="14" y2="20" stroke="white" stroke-width="2" stroke-linecap="round"/>
    <line x1="10" y1="28" x2="14" y2="28" stroke="white" stroke-width="2" stroke-linecap="round"/>
    <line x1="34" y1="20" x2="38" y2="20" stroke="white" stroke-width="2" stroke-linecap="round"/>
    <line x1="34" y1="28" x2="38" y2="28" stroke="white" stroke-width="2" stroke-linecap="round"/>
    <line x1="20" y1="10" x2="20" y2="14" stroke="white" stroke-width="2" stroke-linecap="round"/>
    <line x1="28" y1="10" x2="28" y2="14" stroke="white" stroke-width="2" stroke-linecap="round"/>
    <line x1="20" y1="34" x2="20" y2="38" stroke="white" stroke-width="2" stroke-linecap="round"/>
    <line x1="28" y1="34" x2="28" y2="38" stroke="white" stroke-width="2" stroke-linecap="round"/>
    <!-- Inner brain pattern -->
    <circle cx="21" cy="21" r="2"/>
    <circle cx="27" cy="21" r="2"/>
    <circle cx="24" cy="27" r="2"/>
    <line x1="21" y1="21" x2="27" y2="21" stroke="white" stroke-width="1.5"/>
    <line x1="21" y1="21" x2="24" y2="27" stroke="white" stroke-width="1.5"/>
    <line x1="27" y1="21" x2="24" y2="27" stroke="white" stroke-width="1.5"/>
  </g>
</svg>

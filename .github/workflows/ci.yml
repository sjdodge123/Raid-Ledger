name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  # ─── Scope Detection ──────────────────────────────────────────────
  # Determines which jobs need to run based on changed files.
  # All downstream jobs check these outputs before starting.
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      code: ${{ steps.filter.outputs.code }}
      api: ${{ steps.filter.outputs.api }}
      web: ${{ steps.filter.outputs.web }}
      contract: ${{ steps.filter.outputs.contract }}
      smoke_tests: ${{ steps.filter.outputs.smoke_tests }}
      container: ${{ steps.filter.outputs.container }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Detect changed paths
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            code:
              - 'api/src/**'
              - 'web/src/**'
              - 'packages/**'
              - 'package.json'
              - 'package-lock.json'
              - 'tsconfig*.json'
              - '.eslintrc*'
              - 'vitest.config.*'
              - 'playwright.config.*'
            api:
              - 'api/src/**'
              - 'api/jest*.config.*'
              - 'packages/contract/**'
            web:
              - 'web/src/**'
              - 'web/vitest.config.*'
              - 'packages/contract/**'
            contract:
              - 'packages/contract/**'
            smoke_tests:
              - 'web/src/**'
              - 'scripts/smoke/**'
              - 'playwright.config.*'
              - 'packages/contract/**'
            container:
              - 'Dockerfile*'
              - 'api/Dockerfile'
              - 'api/scripts/docker-entrypoint.sh'
              - 'nginx/**'
              - 'api/src/ai/providers/ollama-docker*'
              - 'api/src/ai/providers/ollama-setup*'

  # ─── Lint + Build ──────────────────────────────────────────────────
  # Skipped for docs/skills-only PRs (no code changes)
  lint:
    runs-on: ubuntu-latest
    needs: detect-changes
    if: >-
      github.event_name == 'push' ||
      needs.detect-changes.outputs.code == 'true'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ runner.os }}-node-modules-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-modules-

      - name: Install dependencies
        run: npm ci

      - name: Build contract
        run: npm run build -w packages/contract

      - name: Build API
        run: npm run build -w api

      - name: Build web
        run: npm run build -w web

      - name: Lint
        run: npm run lint --workspaces

  # ─── Unit Tests (API) ──────────────────────────────────────────────
  unit-tests-api:
    runs-on: ubuntu-latest
    needs: [detect-changes, lint]
    if: >-
      github.event_name == 'push' ||
      needs.detect-changes.outputs.api == 'true'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ runner.os }}-node-modules-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-modules-

      - name: Install dependencies
        run: npm ci

      - name: Build contract
        run: npm run build -w packages/contract

      - name: Test API (with coverage)
        run: npm run test:cov -w api -- --passWithNoTests

  # ─── Unit Tests (Web) ──────────────────────────────────────────────
  unit-tests-web:
    runs-on: ubuntu-latest
    needs: [detect-changes, lint]
    if: >-
      github.event_name == 'push' ||
      needs.detect-changes.outputs.web == 'true'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ runner.os }}-node-modules-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-modules-

      - name: Install dependencies
        run: npm ci

      - name: Build contract
        run: npm run build -w packages/contract

      - name: Test web (with coverage)
        run: npx vitest run --coverage
        working-directory: web

  # ─── Unit Tests (summary — required status check) ─────────────────
  unit-tests:
    runs-on: ubuntu-latest
    needs: [unit-tests-api, unit-tests-web]
    if: always()
    steps:
      - name: Check results
        run: |
          API="${{ needs.unit-tests-api.result }}"
          WEB="${{ needs.unit-tests-web.result }}"
          if [ "$API" = "failure" ] || [ "$WEB" = "failure" ]; then
            echo "Unit tests failed (api=$API, web=$WEB)"
            exit 1
          fi
          echo "Unit tests passed (api=$API, web=$WEB)"

  # ─── Integration Tests (sharded) ───────────────────────────────────
  integration-test-shard:
    runs-on: ubuntu-latest
    needs: [detect-changes, lint]
    if: >-
      github.event_name == 'push' ||
      needs.detect-changes.outputs.api == 'true'
    strategy:
      fail-fast: false
      matrix:
        shard: [1/3, 2/3, 3/3]

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: user
          POSTGRES_PASSWORD: password
          POSTGRES_DB: raid_ledger_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U user -d raid_ledger_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://user:password@localhost:5432/raid_ledger_test
      REDIS_URL: redis://localhost:6379
      JWT_SECRET: ci-test-secret
      CLIENT_URL: http://localhost:5173
      CORS_ORIGIN: http://localhost:5173

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ runner.os }}-node-modules-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-modules-

      - name: Install dependencies
        run: npm ci

      - name: Build contract
        run: npm run build -w packages/contract

      - name: Run integration tests (shard ${{ matrix.shard }})
        run: npm run test:integration -w api -- --shard=${{ matrix.shard }}

  integration-tests:
    runs-on: ubuntu-latest
    needs: [detect-changes, integration-test-shard]
    if: always()
    steps:
      - name: Check shard results
        run: |
          RESULT="${{ needs.integration-test-shard.result }}"
          if [ "$RESULT" = "skipped" ]; then
            echo "Integration tests skipped (no API changes)"
            exit 0
          fi
          if [ "$RESULT" != "success" ]; then
            echo "Integration test shards failed"
            exit 1
          fi

  # ─── Playwright Smoke Tests ────────────────────────────────────────
  # Only runs when web/UI files or Playwright config changed
  smoke-tests:
    runs-on: ubuntu-latest
    needs: [detect-changes, lint]
    if: >-
      github.event_name == 'push' ||
      needs.detect-changes.outputs.smoke_tests == 'true'

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: user
          POSTGRES_PASSWORD: password
          POSTGRES_DB: raid_ledger
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U user -d raid_ledger"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://user:password@localhost:5432/raid_ledger
      REDIS_URL: redis://localhost:6379
      JWT_SECRET: ci-test-secret
      CLIENT_URL: http://localhost:5173
      CORS_ORIGIN: http://localhost:5173
      DEMO_MODE: 'true'
      ADMIN_PASSWORD: playwright-ci-password
      BASE_URL: http://localhost:5173
      API_URL: http://localhost:3000

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ runner.os }}-node-modules-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-modules-

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Build contract
        run: npm run build -w packages/contract

      - name: Build API
        run: npm run build -w api

      - name: Build web
        run: npm run build -w web

      - name: Run database migrations
        run: npm run db:migrate -w api

      - name: Bootstrap admin account
        run: npx ts-node api/scripts/bootstrap-admin.ts

      - name: Start API server
        run: node api/dist/src/main.js &
        env:
          PORT: '3000'

      - name: Wait for API to be ready
        run: |
          for i in $(seq 1 60); do
            if curl -sf http://localhost:3000/health > /dev/null 2>&1; then
              echo "API is ready after ${i}s"
              exit 0
            fi
            sleep 1
          done
          echo "API failed to start within 60s"
          exit 1

      - name: Start web preview server
        run: npx vite preview --port 5173 &
        working-directory: web

      - name: Wait for web server to be ready
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost:5173 > /dev/null 2>&1; then
              echo "Web server is ready after ${i}s"
              exit 0
            fi
            sleep 1
          done
          echo "Web server failed to start within 30s"
          exit 1

      - name: Run Playwright smoke tests
        run: npx playwright test --reporter=github

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  # ─── Container Startup Validation ──────────────────────────────────
  # Only runs on PRs that touch Docker, entrypoint, nginx, or CI files
  container-startup:
    needs: detect-changes
    if: >-
      github.event_name == 'pull_request' &&
      needs.detect-changes.outputs.container == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build allinone image
        run: docker build -f Dockerfile.allinone -t raid-ledger:ci-test --build-arg COMMIT_SHA=${{ github.sha }} .

      - name: Start container
        run: |
          docker run -d --name rl-ci-test \
            -p 8080:80 \
            -e ADMIN_PASSWORD=ci-test-password \
            raid-ledger:ci-test

      - name: Wait for API to start (max 120s)
        run: |
          echo "Waiting for API to respond..."
          for i in $(seq 1 120); do
            # Check if container exited
            RUNNING=$(docker inspect rl-ci-test --format '{{.State.Running}}' 2>/dev/null || echo "false")
            if [ "$RUNNING" = "false" ]; then
              echo "❌ Container exited unexpectedly"
              docker logs rl-ci-test --tail 50
              exit 1
            fi
            # Poll API health directly inside the container (bypasses nginx IPv6 issues)
            if docker exec rl-ci-test wget -qO- http://127.0.0.1:3000/health 2>/dev/null | grep -q '"status":"ok"'; then
              echo "✅ API healthy after ${i}s"
              exit 0
            fi
            sleep 1
          done
          echo "❌ Timed out waiting for API"
          docker logs rl-ci-test --tail 50
          exit 1

      - name: Verify Redis connectivity
        run: |
          docker exec rl-ci-test redis-cli -s /tmp/redis.sock ping | grep -q PONG
          echo "✅ Redis responding on Unix socket"

      - name: Verify nginx proxy
        run: |
          # Use 127.0.0.1 to avoid IPv6 resolution issues in CI
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" http://127.0.0.1:8080/api/health)
          if [ "$HTTP_CODE" = "200" ]; then
            echo "✅ Nginx proxy to API working"
          else
            echo "❌ Nginx proxy returned $HTTP_CODE"
            docker logs rl-ci-test --tail 30
            exit 1
          fi

      - name: Cleanup
        if: always()
        run: |
          docker stop rl-ci-test 2>/dev/null || true
          docker rm rl-ci-test 2>/dev/null || true

  # ─── Docker Image Build (main only) ───────────────────────────────
  docker-build:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [unit-tests, integration-tests, smoke-tests]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Lowercase image name
        run: echo "IMAGE_NAME=${GITHUB_REPOSITORY,,}" >> "$GITHUB_ENV"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=sha,prefix=

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.allinone
          platforms: linux/amd64
          build-args: |
            COMMIT_SHA=${{ github.sha }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=allinone
          cache-to: type=gha,mode=max,scope=allinone
          push: true

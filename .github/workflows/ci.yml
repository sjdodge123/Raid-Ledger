name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  # ─── Scope Detection ──────────────────────────────────────────────
  # Determines which jobs need to run based on changed files.
  # All downstream jobs check these outputs before starting.
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      code: ${{ steps.filter.outputs.code }}
      api: ${{ steps.filter.outputs.api }}
      web: ${{ steps.filter.outputs.web }}
      contract: ${{ steps.filter.outputs.contract }}
      smoke_tests: ${{ steps.filter.outputs.smoke_tests }}
      container: ${{ steps.filter.outputs.container }}
      tools: ${{ steps.filter.outputs.tools }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v7
      - name: Detect changed paths
        uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            code:
              - 'api/src/**'
              - 'web/src/**'
              - 'packages/**'
              - 'package.json'
              - 'package-lock.json'
              - 'tsconfig*.json'
              - '.eslintrc*'
              - 'vitest.config.*'
              - 'playwright.config.*'
            api:
              - 'api/src/**'
              - 'api/jest*.config.*'
              - 'packages/contract/**'
            web:
              - 'web/src/**'
              - 'web/vitest.config.*'
              - 'packages/contract/**'
            contract:
              - 'packages/contract/**'
            smoke_tests:
              - 'web/src/**'
              - 'scripts/smoke/**'
              - 'playwright.config.*'
              - 'packages/contract/**'
            container:
              - 'Dockerfile*'
              - 'api/Dockerfile'
              - 'api/scripts/docker-entrypoint.sh'
              - 'nginx/**'
              - 'api/src/ai/providers/ollama-docker*'
              - 'api/src/ai/providers/ollama-setup*'
            tools:
              - 'tools/mcp-rl-fleet/**'

  # ─── Lint + Build ──────────────────────────────────────────────────
  # Skipped for docs/skills-only PRs (no code changes)
  lint:
    runs-on: ubuntu-latest
    needs: detect-changes
    if: >-
      github.event_name == 'push' ||
      needs.detect-changes.outputs.code == 'true'

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Cache node_modules
        uses: actions/cache@v5
        with:
          path: node_modules
          key: ${{ runner.os }}-node-modules-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-modules-

      - name: Install dependencies
        run: npm ci

      - name: Build contract
        run: npm run build -w packages/contract

      - name: Build API
        run: npm run build -w api

      - name: Build web
        run: npm run build -w web

      # ROK-1136: `nest build` uses api/tsconfig.build.json, which EXCLUDES
      # **/*.spec*.ts and src/common/testing/**, so type errors inside test
      # files (e.g. against the shared drizzle-mock) slip past the build step.
      # Run the full-project typecheck — same command validate-ci.sh uses —
      # so test-file tsc errors fail the PR instead of leaking to main.
      - name: Typecheck (full project, incl. tests)
        run: npx tsc --noEmit -p api/tsconfig.json

      - name: Lint
        run: npm run lint --workspaces

      - name: Prettier check (api)
        run: npm run prettier:check -w api

  # ─── Unit Tests (API) ──────────────────────────────────────────────
  unit-tests-api:
    runs-on: ubuntu-latest
    needs: [detect-changes, lint]
    if: >-
      github.event_name == 'push' ||
      needs.detect-changes.outputs.api == 'true'

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Cache node_modules
        uses: actions/cache@v5
        with:
          path: node_modules
          key: ${{ runner.os }}-node-modules-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-modules-

      - name: Install dependencies
        run: npm ci

      - name: Build contract
        run: npm run build -w packages/contract

      - name: Test API (with coverage)
        run: npm run test:cov -w api -- --passWithNoTests

  # ─── Unit Tests (Web) ──────────────────────────────────────────────
  unit-tests-web:
    runs-on: ubuntu-latest
    needs: [detect-changes, lint]
    if: >-
      github.event_name == 'push' ||
      needs.detect-changes.outputs.web == 'true'

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Cache node_modules
        uses: actions/cache@v5
        with:
          path: node_modules
          key: ${{ runner.os }}-node-modules-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-modules-

      - name: Install dependencies
        run: npm ci

      - name: Build contract
        run: npm run build -w packages/contract

      - name: Test web (with coverage)
        run: npx vitest run --coverage
        working-directory: web

  # ─── Tools Unit Tests (mcp-rl-fleet — ROK-1362) ───────────────────
  # The fleet MCP server (tools/mcp-rl-fleet) has a Vitest suite that is the
  # behavioral gate for fleet-tooling changes, but was not run by any CI job
  # before ROK-1362. This job closes that gap.
  tools-tests:
    runs-on: ubuntu-latest
    needs: [detect-changes]
    if: >-
      github.event_name == 'push' ||
      needs.detect-changes.outputs.tools == 'true'

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Cache node_modules
        uses: actions/cache@v5
        with:
          path: node_modules
          key: ${{ runner.os }}-node-modules-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-modules-

      - name: Install dependencies
        run: npm ci

      - name: Test mcp-rl-fleet (Vitest)
        run: npm test -w @raid-ledger/mcp-rl-fleet

  # ─── Unit Tests (summary — required status check) ─────────────────
  unit-tests:
    runs-on: ubuntu-latest
    needs: [unit-tests-api, unit-tests-web]
    if: always()
    steps:
      - name: Check results
        run: |
          API="${{ needs.unit-tests-api.result }}"
          WEB="${{ needs.unit-tests-web.result }}"
          if [ "$API" = "failure" ] || [ "$WEB" = "failure" ]; then
            echo "Unit tests failed (api=$API, web=$WEB)"
            exit 1
          fi
          echo "Unit tests passed (api=$API, web=$WEB)"

  # ─── Integration Tests (sharded) ───────────────────────────────────
  integration-test-shard:
    runs-on: ubuntu-latest
    needs: [detect-changes, lint]
    if: >-
      github.event_name == 'push' ||
      needs.detect-changes.outputs.api == 'true'
    strategy:
      fail-fast: false
      matrix:
        shard: [1/3, 2/3, 3/3]
        # ROK-1058: repeat each shard 3× to surface order-dependent flake.
        # Combined with `randomize: true` in jest.integration.config.js, every
        # PR exercises 9 distinct file-orderings; a leak that only appears in
        # 1/3 of orderings still fails the matrix.
        run: [1, 2, 3]

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: user
          POSTGRES_PASSWORD: password
          POSTGRES_DB: raid_ledger_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U user -d raid_ledger_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://user:password@localhost:5432/raid_ledger_test
      REDIS_URL: redis://localhost:6379
      JWT_SECRET: ci-test-secret
      CLIENT_URL: http://localhost:5173
      CORS_ORIGIN: http://localhost:5173

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Cache node_modules
        uses: actions/cache@v5
        with:
          path: node_modules
          key: ${{ runner.os }}-node-modules-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-modules-

      - name: Install dependencies
        run: npm ci

      - name: Build contract
        run: npm run build -w packages/contract

      - name: Bump Postgres max_connections
        # GHA service containers don't accept `command:`, so we ALTER SYSTEM
        # and restart the postgres container in place. Default 100 is too
        # low for the shard's combined NestJS boot + parallel-query load.
        run: |
          PG_CONTAINER=$(docker ps --filter "ancestor=pgvector/pgvector:pg16" --format "{{.ID}}" | head -1)
          if [ -z "$PG_CONTAINER" ]; then echo "Postgres container not found"; exit 1; fi
          docker exec "$PG_CONTAINER" psql -U user -d raid_ledger_test -c "ALTER SYSTEM SET max_connections = 300;"
          docker restart "$PG_CONTAINER"
          for i in $(seq 1 30); do
            if docker exec "$PG_CONTAINER" pg_isready -U user -d raid_ledger_test >/dev/null 2>&1; then
              echo "Postgres ready"
              break
            fi
            sleep 1
          done
          docker exec "$PG_CONTAINER" psql -U user -d raid_ledger_test -tAc "SHOW max_connections;"

      - name: Run integration tests (shard ${{ matrix.shard }}, run ${{ matrix.run }})
        run: npm run test:integration -w api -- --shard=${{ matrix.shard }} --randomize

  integration-tests:
    runs-on: ubuntu-latest
    needs: [detect-changes, integration-test-shard]
    if: always()
    steps:
      - name: Check shard results
        run: |
          RESULT="${{ needs.integration-test-shard.result }}"
          if [ "$RESULT" = "skipped" ]; then
            echo "Integration tests skipped (no API changes)"
            exit 0
          fi
          if [ "$RESULT" != "success" ]; then
            echo "Integration test shards failed"
            exit 1
          fi

  # ─── Playwright Smoke Tests (sharded) ──────────────────────────────
  # Only runs when web/UI files or Playwright config changed
  smoke-test-shard:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [detect-changes, lint]
    if: >-
      github.event_name == 'push' ||
      needs.detect-changes.outputs.smoke_tests == 'true'
    strategy:
      fail-fast: false
      matrix:
        shard: [1/5, 2/5, 3/5, 4/5, 5/5]

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: user
          POSTGRES_PASSWORD: password
          POSTGRES_DB: raid_ledger
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U user -d raid_ledger"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://user:password@localhost:5432/raid_ledger
      REDIS_URL: redis://localhost:6379
      JWT_SECRET: ci-test-secret
      CLIENT_URL: http://localhost:5173
      CORS_ORIGIN: http://localhost:5173
      DEMO_MODE: 'true'
      ADMIN_PASSWORD: playwright-ci-password
      BASE_URL: http://localhost:5173
      API_URL: http://localhost:3000
      # ROK-1156: smoke job runs the API on the GHA runner directly (not in a
      # container), so the default `/data/logs` is not writable. Point the
      # LogsService + SlowQueriesService at a runner-writable temp dir so the
      # admin Logs panel + slow-queries cron actually surface files in tests.
      LOG_DIR: /tmp/raid-ledger-logs

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Cache node_modules
        uses: actions/cache@v5
        with:
          path: node_modules
          key: ${{ runner.os }}-node-modules-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-modules-

      - name: Install dependencies
        run: npm ci

      - name: Cache Playwright browsers
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright browsers
        timeout-minutes: 5
        run: |
          for i in 1 2 3; do
            npx playwright install --with-deps chromium && exit 0
            echo "Attempt $i failed; retrying..."
            sleep 5
          done
          exit 1

      - name: Build contract
        run: npm run build -w packages/contract

      - name: Build API
        run: npm run build -w api

      - name: Build web
        run: npm run build -w web

      - name: Create LOG_DIR
        # ROK-1156: pre-create the runner-writable log directory so the API's
        # ConfigService + the SlowQueriesService cron both find a usable path.
        run: mkdir -p /tmp/raid-ledger-logs

      - name: Bump Postgres max_connections
        # GHA service containers don't accept `command:`, so we ALTER SYSTEM
        # and restart the postgres container in place. Default 100 is too
        # low for the boot connection burst + parallel-query test load.
        run: |
          PG_CONTAINER=$(docker ps --filter "ancestor=pgvector/pgvector:pg16" --format "{{.ID}}" | head -1)
          if [ -z "$PG_CONTAINER" ]; then echo "Postgres container not found"; exit 1; fi
          docker exec "$PG_CONTAINER" psql -U user -d raid_ledger -c "ALTER SYSTEM SET max_connections = 300;"
          docker restart "$PG_CONTAINER"
          for i in $(seq 1 30); do
            if docker exec "$PG_CONTAINER" pg_isready -U user -d raid_ledger >/dev/null 2>&1; then
              echo "Postgres ready"
              break
            fi
            sleep 1
          done
          docker exec "$PG_CONTAINER" psql -U user -d raid_ledger -tAc "SHOW max_connections;"

      - name: Run database migrations
        run: npm run db:migrate -w api

      - name: Seed game registry
        run: npm run db:seed:games -w api

      - name: Bootstrap admin account
        run: npx ts-node api/scripts/bootstrap-admin.ts

      - name: Start API server
        run: node api/dist/src/main.js &
        env:
          PORT: '3000'

      - name: Wait for API to be ready
        run: |
          for i in $(seq 1 60); do
            if curl -sf http://localhost:3000/health > /dev/null 2>&1; then
              echo "API is ready after ${i}s"
              exit 0
            fi
            sleep 1
          done
          echo "API failed to start within 60s"
          exit 1

      - name: Start web preview server
        run: npx vite preview --port 5173 &
        working-directory: web

      - name: Wait for web server to be ready
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost:5173 > /dev/null 2>&1; then
              echo "Web server is ready after ${i}s"
              exit 0
            fi
            sleep 1
          done
          echo "Web server failed to start within 30s"
          exit 1

      - name: Run Playwright smoke tests (shard ${{ matrix.shard }})
        run: npx playwright test --shard=${{ matrix.shard }} --reporter=github

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report-shard-${{ strategy.job-index }}
          path: playwright-report/
          retention-days: 7

  smoke-tests:
    runs-on: ubuntu-latest
    needs: [detect-changes, smoke-test-shard]
    if: always()
    steps:
      - name: Check shard results
        run: |
          RESULT="${{ needs.smoke-test-shard.result }}"
          if [ "$RESULT" = "skipped" ]; then
            echo "Smoke tests skipped (no UI changes)"
            exit 0
          fi
          if [ "$RESULT" != "success" ]; then
            echo "Smoke test shards failed"
            exit 1
          fi

  # ─── Container Startup Validation ──────────────────────────────────
  # Only runs on PRs that touch Docker, entrypoint, nginx, or CI files
  container-startup:
    needs: detect-changes
    if: >-
      github.event_name == 'pull_request' &&
      needs.detect-changes.outputs.container == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Build allinone image
        run: docker build -f Dockerfile.allinone -t raid-ledger:ci-test --build-arg COMMIT_SHA=${{ github.sha }} .

      - name: Start container
        run: |
          docker run -d --name rl-ci-test \
            -p 8080:80 \
            -e ADMIN_PASSWORD=ci-test-password \
            raid-ledger:ci-test

      - name: Wait for API to start (max 120s)
        run: |
          echo "Waiting for API to respond..."
          for i in $(seq 1 120); do
            # Check if container exited
            RUNNING=$(docker inspect rl-ci-test --format '{{.State.Running}}' 2>/dev/null || echo "false")
            if [ "$RUNNING" = "false" ]; then
              echo "❌ Container exited unexpectedly"
              docker logs rl-ci-test --tail 50
              exit 1
            fi
            # Poll API health directly inside the container (bypasses nginx IPv6 issues)
            if docker exec rl-ci-test wget -qO- http://127.0.0.1:3000/health 2>/dev/null | grep -q '"status":"ok"'; then
              echo "✅ API healthy after ${i}s"
              exit 0
            fi
            sleep 1
          done
          echo "❌ Timed out waiting for API"
          docker logs rl-ci-test --tail 50
          exit 1

      - name: Verify Redis connectivity
        run: |
          docker exec rl-ci-test redis-cli -s /tmp/redis.sock ping | grep -q PONG
          echo "✅ Redis responding on Unix socket"

      - name: Verify nginx proxy
        run: |
          # Use 127.0.0.1 to avoid IPv6 resolution issues in CI
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" http://127.0.0.1:8080/api/health)
          if [ "$HTTP_CODE" = "200" ]; then
            echo "✅ Nginx proxy to API working"
          else
            echo "❌ Nginx proxy returned $HTTP_CODE"
            docker logs rl-ci-test --tail 30
            exit 1
          fi

      - name: Verify JWT guard rejects known dev defaults (ROK-1292)
        # Negative-path test: start a fresh container with each banned literal
        # as JWT_SECRET and assert start-api.sh logs the FATAL guard message.
        # Uses a separate container per literal so prior cached state (e.g.
        # /data/.jwt_secret) from the previous step doesn't influence the
        # guard's env-var-priority branch.
        run: |
          for SECRET in "raid-ledger-default-secret-change-in-production" "dev-secret-change-in-prod"; do
            CONTAINER="rl-jwt-guard-$(echo "$SECRET" | tr -c 'a-z0-9' '-' | head -c 30)"
            echo "── Testing JWT_SECRET=$SECRET should be rejected ──"
            docker run -d --name "$CONTAINER" \
              -e JWT_SECRET="$SECRET" \
              -e ADMIN_PASSWORD=ci-test-password \
              raid-ledger:ci-test
            FOUND=0
            for i in $(seq 1 60); do
              if docker logs "$CONTAINER" 2>&1 | grep -q "FATAL: JWT_SECRET is still an insecure hardcoded default"; then
                echo "✅ Guard rejected '$SECRET' after ${i}s"
                FOUND=1
                break
              fi
              sleep 1
            done
            if [ "$FOUND" != "1" ]; then
              echo "❌ Guard did NOT reject '$SECRET' within 60s — dumping diagnostics:"
              echo "─── docker inspect ───"
              docker inspect "$CONTAINER" --format '{{.State.Status}} (exit {{.State.ExitCode}})' 2>&1 || true
              echo "─── docker logs (tail 200) ───"
              docker logs "$CONTAINER" --tail 200 2>&1 || true
              docker stop "$CONTAINER" 2>/dev/null || true
              docker rm -f "$CONTAINER" 2>/dev/null || true
              exit 1
            fi
            docker stop "$CONTAINER" 2>/dev/null || true
            docker rm -f "$CONTAINER" 2>/dev/null || true
          done

      - name: Cleanup
        if: always()
        run: |
          docker stop rl-ci-test 2>/dev/null || true
          docker rm rl-ci-test 2>/dev/null || true
          # Defensive: the JWT-guard step cleans up its own containers, but
          # if it errored mid-loop one might still be around.
          for SECRET in "raid-ledger-default-secret-change-in-production" "dev-secret-change-in-prod"; do
            CONTAINER="rl-jwt-guard-$(echo "$SECRET" | tr -c 'a-z0-9' '-' | head -c 30)"
            docker stop "$CONTAINER" 2>/dev/null || true
            docker rm -f "$CONTAINER" 2>/dev/null || true
          done

  # ─── Synthetic Production Volume Gate (ROK-1036) ───────────────────
  # Boots the allinone image against a pre-populated volume that mimics a
  # pre-1036 production /data tree: root-owned .jwt_secret, root-owned log
  # files, postgres-owned PGDATA, ~50 root-owned avatar PNGs, and a
  # root-owned dump in /data/backups/daily/. Asserts the privilege-drop
  # entrypoint chowns the right paths, that postgresql.log and redis.log
  # retain their original owners, that nginx workers and node drop to `app`,
  # and that no `PERMISSION DENIED` lines leak into docker logs.
  container-upgrade-path:
    needs: detect-changes
    if: >-
      github.event_name == 'pull_request' &&
      needs.detect-changes.outputs.container == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Build allinone image
        run: docker build -f Dockerfile.allinone -t raid-ledger:ci-upgrade --build-arg COMMIT_SHA=${{ github.sha }} .

      - name: Seed synthetic production volume
        # UIDs/GIDs hard-coded to match the production image's apk-installed
        # users (postgres=70:70, redis=101:102). Numeric chown avoids relying
        # on the seed-side alpine container having those named users.
        run: |
          docker volume create rl-priv-test
          docker run --rm -v rl-priv-test:/data alpine sh -c '
            set -e
            mkdir -p /data/postgresql /data/redis /data/backups/daily \
                     /data/backups/migrations /data/logs /data/avatars \
                     /data/uploads/branding
            # Root-owned secret (pre-1036 state from ROK-1035)
            printf "test-secret-value" > /data/.jwt_secret
            chmod 600 /data/.jwt_secret
            touch /data/.jwt_secret_migrated
            # Root-owned log files (pre-1036 state — entrypoint must flip
            # api.log + nginx.log to app and KEEP postgresql.log/redis.log on
            # their respective UIDs).
            printf "old api log\n"        > /data/logs/api.log
            printf "old nginx log\n"      > /data/logs/nginx.log
            printf "old postgresql log\n" > /data/logs/postgresql.log
            printf "old redis log\n"      > /data/logs/redis.log
            # 50 dummy avatar PNGs to exercise the recursive chown on a
            # non-empty tree.
            for i in $(seq 1 50); do
              printf "\x89PNG\r\n\x1a\ndummy" > /data/avatars/avatar-${i}.png
            done
            # Small backup dump in /data/backups/daily/
            printf "dummy dump\n" > /data/backups/daily/snapshot.dump
            # PGDATA + redis dir ownership (numeric — matches prod image users)
            chown -R 70:70   /data/postgresql
            chown -R 101:102 /data/redis
            chown 70:70   /data/logs/postgresql.log
            chown 101:102 /data/logs/redis.log
          '
          echo "✅ Synthetic volume seeded"

      - name: Start container against synthetic volume
        run: |
          docker run -d --name rl-upgrade-test \
            -v rl-priv-test:/data \
            -p 8080:80 \
            -e ADMIN_PASSWORD=ci-test-password \
            raid-ledger:ci-upgrade

      - name: Wait for /api/health (max 90s)
        run: |
          for i in $(seq 1 90); do
            RUNNING=$(docker inspect rl-upgrade-test --format '{{.State.Running}}' 2>/dev/null || echo "false")
            if [ "$RUNNING" = "false" ]; then
              echo "❌ Container exited unexpectedly"
              docker logs rl-upgrade-test --tail 80
              exit 1
            fi
            if curl -fsS http://127.0.0.1:8080/api/health 2>/dev/null | grep -q '"status":"ok"'; then
              echo "✅ /api/health OK after ${i}s"
              exit 0
            fi
            sleep 1
          done
          echo "❌ Timed out waiting for /api/health"
          docker logs rl-upgrade-test --tail 80
          exit 1

      - name: Assert privilege-drop process topology
        run: |
          PS=$(docker exec rl-upgrade-test ps -o user,comm)
          echo "$PS"
          # nginx master must be root
          echo "$PS" | grep -E '^root[[:space:]]+nginx' >/dev/null || {
            echo "❌ No root nginx master found"; exit 1; }
          # nginx workers must be app
          echo "$PS" | grep -E '^app[[:space:]]+nginx' >/dev/null || {
            echo "❌ No app nginx worker found"; exit 1; }
          # node must be app
          echo "$PS" | grep -E '^app[[:space:]]+node' >/dev/null || {
            echo "❌ Node is not running as app"; exit 1; }
          echo "✅ Process topology correct"

      - name: Assert /data/.jwt_secret is app:app 600
        run: |
          LINE=$(docker exec rl-upgrade-test ls -l /data/.jwt_secret)
          echo "$LINE"
          echo "$LINE" | grep -E '^-rw-------[^ ]*[[:space:]]+[0-9]+[[:space:]]+app[[:space:]]+app' >/dev/null || {
            echo "❌ .jwt_secret is not app:app 600"; exit 1; }

      - name: Assert postgresql.log retained postgres:postgres
        run: |
          LINE=$(docker exec rl-upgrade-test ls -l /data/logs/postgresql.log)
          echo "$LINE"
          echo "$LINE" | grep -E '[[:space:]]postgres[[:space:]]+postgres[[:space:]]' >/dev/null || {
            echo "❌ postgresql.log is NOT postgres:postgres after recursive chown (regression)"
            exit 1; }

      - name: Assert redis.log retained redis:redis
        run: |
          LINE=$(docker exec rl-upgrade-test ls -l /data/logs/redis.log)
          echo "$LINE"
          echo "$LINE" | grep -E '[[:space:]]redis[[:space:]]+redis[[:space:]]' >/dev/null || {
            echo "❌ redis.log is NOT redis:redis after recursive chown (regression)"
            exit 1; }

      - name: Assert api.log is app:app
        run: |
          LINE=$(docker exec rl-upgrade-test ls -l /data/logs/api.log)
          echo "$LINE"
          echo "$LINE" | grep -E '[[:space:]]app[[:space:]]+app[[:space:]]' >/dev/null || {
            echo "❌ api.log is not app:app"; exit 1; }

      - name: Assert avatars chowned to app:app
        run: |
          docker exec rl-upgrade-test sh -c 'ls -l /data/avatars/avatar-1.png /data/avatars/avatar-25.png /data/avatars/avatar-50.png' | tee /tmp/avatar-listing
          COUNT=$(grep -E '[[:space:]]app[[:space:]]+app[[:space:]]' /tmp/avatar-listing | wc -l)
          if [ "$COUNT" -lt 1 ]; then
            echo "❌ No avatar PNG was chowned to app:app — recursive chown did not run"
            exit 1
          fi

      - name: Assert privilege-drop diagnostics + no PERMISSION DENIED
        run: |
          LOGS=$(docker logs rl-upgrade-test 2>&1)
          echo "$LOGS" | grep -E '🔒 API running as: uid=1001' >/dev/null || {
            echo "❌ Missing '🔒 API running as: uid=1001' diagnostic"
            echo "--- last 50 log lines ---"
            echo "$LOGS" | tail -50
            exit 1; }
          if echo "$LOGS" | grep -i 'PERMISSION DENIED' >/dev/null; then
            echo "❌ Found PERMISSION DENIED lines in docker logs:"
            echo "$LOGS" | grep -i 'PERMISSION DENIED'
            exit 1
          fi
          echo "✅ Diagnostics present, no PERMISSION DENIED"

      - name: Cleanup
        if: always()
        run: |
          docker stop rl-upgrade-test 2>/dev/null || true
          docker rm rl-upgrade-test 2>/dev/null || true
          docker volume rm rl-priv-test 2>/dev/null || true

  # ─── Docker Image Build (main only) ───────────────────────────────
  docker-build:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [unit-tests, integration-tests, smoke-tests]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Lowercase image name
        run: echo "IMAGE_NAME=${GITHUB_REPOSITORY,,}" >> "$GITHUB_ENV"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=sha,prefix=

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile.allinone
          platforms: linux/amd64
          build-args: |
            COMMIT_SHA=${{ github.sha }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=allinone
          cache-to: type=gha,mode=max,scope=allinone
          push: true

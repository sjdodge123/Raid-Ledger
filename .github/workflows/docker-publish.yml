name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  docker-build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Lowercase image name
        run: echo "IMAGE_NAME=${GITHUB_REPOSITORY,,}" >> "$GITHUB_ENV"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.allinone
          platforms: linux/amd64
          build-args: |
            COMMIT_SHA=${{ github.sha }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=allinone
          cache-to: type=gha,mode=max,scope=allinone
          push: true

  release:
    runs-on: ubuntu-latest
    needs: docker-build
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
          body: |
            ## Quick Deploy

            ```bash
            docker run -d -p 80:80 \
              -v raid-ledger-data:/data \
              ghcr.io/${{ github.repository }}:${{ github.ref_name }}
            ```

            Check container logs for admin credentials. The `-v` mount ensures data persists across container updates (e.g. Watchtower).

            **Reset admin password:**
            ```bash
            docker run -d -p 80:80 -e ADMIN_PASSWORD=mynewpassword \
              -v raid-ledger-data:/data \
              ghcr.io/${{ github.repository }}:${{ github.ref_name }}
            ```

            See [README](https://github.com/${{ github.repository }}#readme) for full setup.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "America/Los_Angeles"
    open-pull-requests-limit: 5
    versioning-strategy: "increase"
    commit-message:
      prefix: "chore(deps)"
      include: "scope"
    labels:
      - "dependencies"
    groups:
      nestjs:
        patterns:
          - "@nestjs/*"
      tanstack:
        patterns:
          - "@tanstack/*"
      react:
        patterns:
          - "react"
          - "react-dom"
          - "@types/react"
          - "@types/react-dom"
      # @vitest/coverage-v8 declares an exact-version peer dep on vitest
      # (e.g. coverage-v8@4.1.5 requires vitest@4.1.5, not ^4.1.5). Keep
      # vitest and every @vitest/* package in lockstep so a minor bump of
      # one always pulls the matching version of the other in the same PR.
      # Without this, a coverage-v8 bump alone breaks `vitest run --coverage`
      # in CI (see ROK-1205 / PR #696).
      vitest-suite:
        patterns:
          - "vitest"
          - "@vitest/*"
      dev-dependencies:
        dependency-type: "development"
        update-types:
          - "minor"
          - "patch"

  - package-ecosystem: "npm"
    directory: "/tools/test-bot"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "America/Los_Angeles"
    open-pull-requests-limit: 2
    versioning-strategy: "increase"
    commit-message:
      prefix: "chore(deps,test-bot)"
      include: "scope"
    labels:
      - "dependencies"
    groups:
      test-bot-dev:
        dependency-type: "development"
        update-types:
          - "minor"
          - "patch"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "America/Los_Angeles"
    open-pull-requests-limit: 3
    commit-message:
      prefix: "chore(ci)"
    labels:
      - "dependencies"
      - "ci"
    groups:
      gh-actions:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
